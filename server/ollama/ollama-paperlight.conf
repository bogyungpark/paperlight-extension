# Paperlight Ollama overrides
# Installed at /etc/systemd/system/ollama.service.d/paperlight.conf
#
# - OLLAMA_HOST: bind on all interfaces so the Chrome extension on the LAN
#   can reach the server. If you only want loopback, set 127.0.0.1:11434.
# - OLLAMA_ORIGINS: CORS allow-list. Chrome extensions always have the
#   chrome-extension:// scheme; the wildcard covers any extension ID
#   without committing to a specific one yet.
# - OLLAMA_KEEP_ALIVE: how long models stay resident after the last request.
#   Long keep-alive avoids cold loads when you skim a paper.

[Service]
Environment="OLLAMA_HOST=0.0.0.0:11434"
Environment="OLLAMA_ORIGINS=chrome-extension://*,moz-extension://*"
Environment="OLLAMA_KEEP_ALIVE=30m"
